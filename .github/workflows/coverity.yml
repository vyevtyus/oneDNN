name: Coverity Scan

on:

# Only run on push to master branch
  push:
    branches: [dev/vyevtyus/coverity_scan_enabling]
  workflow_dispatch:


permissions: read-all

env:
  BUILD_CONCURRENCY: 4
  COVERITY_PROJECT: vyevtyus%2FoneDNN

jobs:
  coverity_linux:
    name: Coverity Linux
    if: github.repository == 'vyevtyus/oneDNN'
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux 64 Coverity Tool
        run: |
          curl https://scan.coverity.com/download/cxx/linux64 --output ${GITHUB_WORKSPACE}/cov-linux64-tool.tar.gz \
            --data "token=${{secrets.COVERITY_TOKEN}}&project=${{env.COVERITY_PROJECT}}"
          mkdir cov-linux64-tool
          tar -xzf cov-linux64-tool.tar.gz --strip 1 -C cov-linux64-tool
      - name: Download Intel compiler
        run: |
          wget --progress=dot:giga https://registrationcenter-download.intel.com/akdlm/IRC_NAS/cd63be99-88b0-4981-bea1-2034fe17f5cf/intel-dpcpp-cpp-compiler-2025.1.0.573_offline.sh
          sudo bash intel-dpcpp-cpp-compiler-2025.1.0.573_offline.sh -s -a -s --action install --eula accept
      - name: Prepare and run Coverity build
        run: |
          source /opt/intel/oneapi/setvars.sh
          export CC=icx
          export CXX=icpx
          export PATH="${PWD}/cov-linux64-tool/bin:${PATH}"
          cov-configure --template --compiler /opt/intel/oneapi/compiler/latest/bin/icx --comptype intel_icx:linux
